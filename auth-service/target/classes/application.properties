spring.application.name=auth-service
server.port=8081

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.datasource.url=jdbc:h2:mem:nexushr_auth;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

security.jwt.secret=7f4c4e657875734852446179325365637265744b6579466f724a77745369676e696e674b6579313233
security.jwt.access-token-expiration=900000
security.jwt.refresh-token-expiration=604800000
